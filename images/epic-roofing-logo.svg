<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 90" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <linearGradient id="shieldGradHeader" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#0A0A0A" />
    </linearGradient>
    <linearGradient id="orangeGradHeader" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D32F2F" />
      <stop offset="100%" stop-color="#B71C1C" />
    </linearGradient>
    <filter id="dropShadowHeader" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Transparent Background, suited beautifully for sticky navy headers -->

  <!-- Logo Icon on the left -->
  <g filter="url(#dropShadowHeader)" transform="translate(6, 0)">
    <!-- Polished Shield Body outer stroke -->
    <path d="M 20 18 L 76 18 L 76 48 C 76 66, 58 78, 48 83 C 38 78, 20 66, 20 48 Z" 
          fill="url(#shieldGradHeader)" stroke="#D32F2F" stroke-width="4.5" stroke-linejoin="round" />
    
    <!-- White Shield inner hairline accent -->
    <path d="M 25 23 L 71 23 L 71 47 C 71 61, 56 71, 48 75 C 40 71, 25 61, 25 47 Z" 
          fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" opacity="0.35" />

    <!-- Highly Stylized Roof -->
    <!-- Outer roof slope -->
    <path d="M 29 46 L 48 29 L 67 46" fill="none" stroke="url(#orangeGradHeader)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Inner space & secondary shield-roof or home outline -->
    <path d="M 36 52 L 48 42 L 60 52" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Heavy Chimney detail -->
    <rect x="58" y="31" width="5.5" height="9" fill="url(#orangeGradHeader)" />
    
    <!-- Miniature star accent -->
    <path d="M 48 53.5 L 49.5 56.5 L 53 56.5 L 50.5 58.5 L 51.5 62 L 48 60 L 44.5 62 L 45.5 58.5 L 43 56.5 L 46.5 56.5 Z" fill="#FFFFFF" />
  </g>

  <!-- Typography elements on the right -->
  <!-- Company Name -->
  <text x="102" y="47" font-family="'Barlow', 'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" 
        font-weight="900" font-size="28" fill="#FFFFFF" letter-spacing="1">
    <tspan fill="#D32F2F">EPIC</tspan> ROOFING <tspan fill="#ECEFF1" font-weight="400">TX</tspan>
  </text>
  
  <!-- Subtle divider accent line -->
  <line x1="102" y1="56" x2="390" y2="56" stroke="#D32F2F" stroke-width="1.5" opacity="0.75" />

  <!-- Tagline: Houston's Storm Damage Specialists -->
  <text x="102" y="71" font-family="'Open Sans', 'Inter', 'Helvetica Neue', sans-serif" 
        font-weight="700" font-size="9.5" fill="#FFFFFF" letter-spacing="1.8" opacity="0.9">
    HOUSTON'S STORM DAMAGE SPECIALISTS
  </text>
</svg>
